version: '3.8'

services:
  sagejirabot:
    build: .
    ports:
      - "3006:3006"
    environment:
      # Azure AI Foundry (required for LLM calls)
      - AZURE_OPENAI_ENDPOINT=${AZURE_OPENAI_ENDPOINT}
      - AZURE_OPENAI_V1_BASE_URL=${AZURE_OPENAI_V1_BASE_URL}
      # Jira credentials (required for ticket creation)
      - JIRA_BASE_URL=${JIRA_BASE_URL}
      - JIRA_EMAIL=${JIRA_EMAIL}
      - JIRA_API_TOKEN=${JIRA_API_TOKEN}
      - JIRA_PROJECT_KEY=${JIRA_PROJECT_KEY}
      # Bot Framework (from IT after Azure Bot Service provisioned)
      - BOT_APP_ID=${BOT_APP_ID}
      - BOT_APP_PASSWORD=${BOT_APP_PASSWORD}
      - BOT_DEFAULT_PROJECT=${BOT_DEFAULT_PROJECT:-ST}
      - BOT_MAX_TICKETS_PER_RUN=${BOT_MAX_TICKETS_PER_RUN:-10}
      - BOT_SESSION_TIMEOUT_MINUTES=${BOT_SESSION_TIMEOUT_MINUTES:-30}
      - BOT_DRY_RUN_DEFAULT=${BOT_DRY_RUN_DEFAULT:-false}
      - BOT_HOST=0.0.0.0
      - BOT_PORT=3006
      # Auth override for Docker (set by start-docker.sh)
      - AZURE_AUTH_MODE=${AZURE_AUTH_MODE:-az_login}
      - AZURE_OPENAI_KEY=${AZURE_OPENAI_KEY:-}
    # .env file is NOT baked into the image — it is loaded at runtime
    # For local dev: docker-compose will pick up .env automatically
    env_file:
      - .env
    volumes:
      # Per-user prefs (last Jira project, etc.) — survives container rebuilds.
      # TODO: when migrating to Azure Container Apps, swap this for Azure Table
      # Storage since ACA has ephemeral local storage.
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:3006/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
